<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script type="text/javascript">
      // When GitHub Pages serves this 404.html from a nonexistent path,
      // the pathname will equal the requested URL (e.g. "/downloads").
      // To recover we store the original path then always navigate to root
      // so that the SPA can boot and rewrite the history entry.
      const original = window.location.pathname + window.location.search + window.location.hash;
      if (original && original !== '/') {
        sessionStorage.redirect = original;
      }
      // always redirect to root, relative in case repo is not at domain root
      window.location.replace('/');
    </script>
  </head>
  <body>
  </body>
</html>
